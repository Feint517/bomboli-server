name: bomboli-services

services:
  redis:
    image: redis:7-alpine
    container_name: bomboli-redis
    ports:
      - '6381:6379'
    volumes:
      - bomboli-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  bomboli-redis-data:
